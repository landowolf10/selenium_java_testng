version: 2.1

jobs:
  build-and-test:
    machine: true

    steps:
      - checkout

      - run:
          name: Build Docker image
          command: docker build -t selenium_java_testng .

      - run:
          name: Run tests
          command: |
            rm -rf build
            mkdir -p build

            docker run --rm \
              -v $(pwd)/build:/usr/src/app/build \
              -e TEST_RUNNER=all_tests \
              -e SELENIUM_GRID_ENABLED=false \
              selenium_java_testng || true
          when: always

      - run:
          name: Install Allure
          command: |
            ALLURE_VERSION=2.37.0
            sudo apt-get update
            sudo apt-get install -y default-jre
            wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
            tar -zxvf allure-${ALLURE_VERSION}.tgz
            sudo mv allure-${ALLURE_VERSION} /opt/allure
            sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - run:
          name: Generate Allure Report
          command: |
            allure generate build/allure-results -o build/reports/allure-report --clean
          when: always

      - store_artifacts:
          path: build/reports/allure-report
          destination: allure-report
          when: always

workflows:
  version: 2
  build-test:
    jobs:
      - build-and-test