version: 2.1
jobs:
  build:
    machine: true
    steps:
      - checkout
      - run:
          name: Build Docker image
          command: docker build -t selenium_java_testng .
      - run:
          name: Run tests inside container
          command: |
            docker run --rm \
              -v $(pwd)/build:/usr/src/app/build \
              -e TEST_RUNNER=all_tests \
              -e SELENIUM_GRID_ENABLED=false \
              selenium_java_testng
      - store_artifacts:
          path: build/reports/allure-report
          destination: allure-report
          when: always

workflows:
  version: 2
  build-test:
    jobs:
      - build